<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Vue + Python 插件</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin: 0 0 8px 0;
    }

    .header p {
      opacity: 0.9;
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #374151;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .feature {
      background: #f0f4ff;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .feature-title {
      font-weight: 600;
      color: #1e40af;
      margin-bottom: 4px;
    }

    .feature-desc {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="container">
      <div class="header">
        <h1>🚀 Vue + Python 插件</h1>
        <p>响应式前端 + 强大的 Python 后端处理</p>
      </div>

      <div class="card">
        <h3>🔧 数据处理工具</h3>

        <div class="input-group">
          <label>输入数据</label>
          <textarea v-model="inputData" placeholder="输入要处理的数据..." rows="4"></textarea>
        </div>

        <div class="input-group">
          <label>处理类型</label>
          <select v-model="selectedOperation">
            <option value="format">格式化 JSON</option>
            <option value="validate">验证数据</option>
            <option value="transform">数据转换</option>
            <option value="statistics">统计分析</option>
          </select>
        </div>

        <div class="btn-group">
          <button @click="processData" :disabled="loading || !inputData.trim()">
            <span v-if="loading" class="loading">
              <div class="spinner"></div>
              处理中...
            </span>
            <span v-else>🚀 执行 Python 处理</span>
          </button>
          <button @click="clearAll">🗑️ 清除所有</button>
        </div>

        <div v-if="result" class="result">{{ result }}</div>
      </div>

      <div class="card">
        <h4>✨ 技术特色</h4>
        <div class="feature-grid">
          <div class="feature">
            <div class="feature-icon">⚡</div>
            <div class="feature-title">Vue 3 响应式</div>
            <div class="feature-desc">现代化前端框架</div>
          </div>
          <div class="feature">
            <div class="feature-icon">🐍</div>
            <div class="feature-title">Python 后端</div>
            <div class="feature-desc">强大的数据处理</div>
          </div>
          <div class="feature">
            <div class="feature-icon">🔄</div>
            <div class="feature-title">实时通信</div>
            <div class="feature-desc">IPC + 子进程</div>
          </div>
          <div class="feature">
            <div class="feature-icon">📊</div>
            <div class="feature-title">数据分析</div>
            <div class="feature-desc">JSON 处理与统计</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const inputData = ref('');
        const selectedOperation = ref('format');
        const result = ref('');
        const loading = ref(false);

        const processData = async () => {
          if (!inputData.value.trim()) return;

          loading.value = true;
          result.value = '';

          try {
            const response = await window.api.plugin.backendCall(
              'com.example.vue-python',
              selectedOperation.value,
              JSON.stringify({
                data: inputData.value,
                timestamp: new Date().toISOString()
              })
            );

            result.value = response;
          } catch (error) {
            result.value = `❌ 错误: ${error.message}`;
          } finally {
            loading.value = false;
          }
        };

        const clearAll = () => {
          inputData.value = '';
          result.value = '';
        };

        return {
          inputData,
          selectedOperation,
          result,
          loading,
          processData,
          clearAll
        };
      }
    }).mount('#app');
  </script>
</body>

</html>
